name: Web3 workflow validation

on:
  push:
  pull_request:

jobs:
  workflow-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: python -m pip install --upgrade jsonschema pyyaml

      - name: Validate JSON schemas
        run: |
          python - <<'PY'
          import glob, json
          for path in glob.glob('skills/web3-ai-bounty/schemas/*.schema.json'):
              with open(path, 'r', encoding='utf-8') as handle:
                  json.load(handle)
          print('schema_json_ok')
          PY

      - name: Compile Python helpers
        run: |
          python -m py_compile \
            skills/web3-ai-bounty/scripts/schema_validator.py \
            skills/web3-ai-bounty/scripts/execution_safety_gate.py \
            skills/web3-ai-bounty/scripts/web3_result_lint.py

      - name: Run safety and result linter self-tests
        run: |
          python skills/web3-ai-bounty/scripts/execution_safety_gate.py --self-test
          python skills/web3-ai-bounty/scripts/web3_result_lint.py --self-test

      - name: Check Web3 command output contracts
        run: |
          python - <<'PY'
          from pathlib import Path
          missing = [str(p) for p in Path('prompts/opencode-commands').glob('web3-*.md') if 'web3_result:' not in p.read_text(encoding='utf-8')]
          if missing:
              raise SystemExit('web3_result missing from:\n' + '\n'.join(missing))
          legacy_files = [
              Path('skills/poc-first-validator/SKILL.md'),
              Path('skills/report-readiness-checker/SKILL.md'),
          ]
          legacy_tokens = ['N/A-RISK', 'REPORT-READY', 'CHAIN REQUIRED']
          hits = []
          for path in legacy_files:
              text = path.read_text(encoding='utf-8')
              for token in legacy_tokens:
                  if token in text:
                      hits.append(f'{path}: {token}')
          if hits:
              raise SystemExit('legacy status tokens found:\n' + '\n'.join(hits))
          print('web3_command_contracts_ok')
          PY

      - name: Validate installer and focused install
        run: |
          bash -n scripts/install-opencode-assets.sh
          bash scripts/install-opencode-assets.sh --install --dest "$RUNNER_TEMP/opencode" --web3-only --verify-hashes --no-backup
